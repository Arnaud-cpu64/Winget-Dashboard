# ============================================================
# .gitlab-ci.yml — Validation du code source
#
# Dépôt GitLab : git@git.devops.etat-ge.ch:DEVELOPPEUR-PEDAGO/windows/SEMWinget.git
#
# Les images Docker sont construites et publiées sur GHCR
# par GitHub Actions (push d'un tag sur GitHub).
# Ce pipeline valide uniquement que le code TypeScript compile.
#
# Déclencheurs : tout push sur main ou merge request
# ============================================================

stages:
  - validate

variables:
  # Forcer pnpm à utiliser un dossier de cache connu pour le cache GitLab CI
  PNPM_HOME: "${CI_PROJECT_DIR}/.pnpm-store"

# ------------------------------------------------------------------
# Validation TypeScript — vérifie que le code compile sans erreurs
# Utilise le script racine "typecheck" qui compile les libs
# partagées avant de valider les artifacts (ordre correct)
# ------------------------------------------------------------------
validate:
  stage: validate
  image: node:20-slim
  before_script:
    - npm install -g pnpm@10 --silent
    - pnpm config set store-dir $PNPM_HOME
    - pnpm install --frozen-lockfile
  script:
    - pnpm run typecheck
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
      - node_modules/
