# ============================================================
# .gitlab-ci.yml — Build & Push des images Docker
# vers le registre GitLab interne
#
# Déclencheurs :
#   - Push d'un tag vX.Y.Z  → images taguées vX.Y.Z + latest
#   - Pipeline manuel        → tag "latest"
#
# Dépôt GitLab : git@git.devops.etat-ge.ch:DEVELOPPEUR-PEDAGO/windows/SEMWinget.git
#
# Variables GitLab injectées automatiquement :
#   CI_REGISTRY          — hostname du registre (ex: registry.devops.etat-ge.ch)
#   CI_REGISTRY_IMAGE    — chemin complet (ex: registry.devops.etat-ge.ch/DEVELOPPEUR-PEDAGO/windows/SEMWinget)
#   CI_REGISTRY_USER     — utilisateur pour docker login
#   CI_REGISTRY_PASSWORD — token pour docker login
# ============================================================

stages:
  - build

variables:
  DOCKER_DRIVER:      overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Tag par défaut si déclenché manuellement sans tag git
  IMAGE_TAG: ${CI_COMMIT_TAG:-latest}

# ------------------------------------------------------------------
# Template commun à tous les jobs de build
# ------------------------------------------------------------------
.build_template: &build_template
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  rules:
    - if: $CI_COMMIT_TAG          # push d'un tag vX.Y.Z
    - if: $CI_PIPELINE_SOURCE == "web"   # déclenchement manuel

# ------------------------------------------------------------------
# Image API
# ------------------------------------------------------------------
build-api:
  <<: *build_template
  script:
    - |
      docker build \
        -f Dockerfile.api \
        -t "$CI_REGISTRY_IMAGE/wg-repo-api:$IMAGE_TAG" \
        -t "$CI_REGISTRY_IMAGE/wg-repo-api:latest" \
        .
    - docker push "$CI_REGISTRY_IMAGE/wg-repo-api:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/wg-repo-api:latest"

# ------------------------------------------------------------------
# Image Dashboard
# ------------------------------------------------------------------
build-dashboard:
  <<: *build_template
  script:
    - |
      docker build \
        -f Dockerfile.dashboard \
        --build-arg BASE_PATH=/ \
        -t "$CI_REGISTRY_IMAGE/wg-repo-dashboard:$IMAGE_TAG" \
        -t "$CI_REGISTRY_IMAGE/wg-repo-dashboard:latest" \
        .
    - docker push "$CI_REGISTRY_IMAGE/wg-repo-dashboard:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/wg-repo-dashboard:latest"

# ------------------------------------------------------------------
# Image Migrator
# ------------------------------------------------------------------
build-migrator:
  <<: *build_template
  script:
    - |
      docker build \
        -f Dockerfile.migrator \
        -t "$CI_REGISTRY_IMAGE/wg-repo-migrator:$IMAGE_TAG" \
        -t "$CI_REGISTRY_IMAGE/wg-repo-migrator:latest" \
        .
    - docker push "$CI_REGISTRY_IMAGE/wg-repo-migrator:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/wg-repo-migrator:latest"
