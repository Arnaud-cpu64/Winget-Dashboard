# ============================================================
# .gitlab-ci.yml — Validation du code source
#
# Dépôt GitLab : git@git.devops.etat-ge.ch:DEVELOPPEUR-PEDAGO/windows/SEMWinget.git
#
# Le déploiement se fait directement sur les serveurs RHEL9
# en clonant ce dépôt et en construisant les images Docker
# localement (pas de registre Docker requis).
#
# Déclencheurs : tout push sur main ou merge request
# ============================================================

stages:
  - validate

variables:
  NODE_VERSION: "20"

# ------------------------------------------------------------------
# Validation TypeScript — vérifie que le code compile sans erreurs
# ------------------------------------------------------------------
validate:
  stage: validate
  image: node:20-slim
  before_script:
    - npm install -g pnpm@10 --silent
    - pnpm install --frozen-lockfile
  script:
    - pnpm --filter @workspace/api-server    exec tsc --noEmit
    - pnpm --filter @workspace/winget-dashboard exec tsc --noEmit
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - node_modules/
      - .pnpm-store/
