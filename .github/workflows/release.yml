# ============================================================
# release.yml — Build & Push des images Docker sur GHCR
#
# Déclencheurs :
#   - Push d'un tag vX.Y.Z  → images taguées vX.Y.Z + latest
#   - Déclenchement manuel   → tag personnalisable
# ============================================================

name: Build & Push Docker images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag d'image (ex: v1.2.3 ou latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcul du tag d'image
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------
      # Image API
      # ----------------------------------------------------------
      - name: Build & Push — API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/wg-repo-api:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/wg-repo-api:latest

      # ----------------------------------------------------------
      # Image Dashboard
      # ----------------------------------------------------------
      - name: Build & Push — Dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=dashboard
          cache-to:   type=gha,scope=dashboard,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/wg-repo-dashboard:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/wg-repo-dashboard:latest

      # ----------------------------------------------------------
      # Image Migrator (schéma Drizzle)
      # ----------------------------------------------------------
      - name: Build & Push — Migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrator
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=migrator
          cache-to:   type=gha,scope=migrator,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/wg-repo-migrator:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/wg-repo-migrator:latest

      - name: Résumé du déploiement
        run: |
          echo "## Images publiées 🐳" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| wg-repo-api | \`${{ steps.tag.outputs.value }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| wg-repo-dashboard | \`${{ steps.tag.outputs.value }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| wg-repo-migrator | \`${{ steps.tag.outputs.value }}\` |" >> "$GITHUB_STEP_SUMMARY"
