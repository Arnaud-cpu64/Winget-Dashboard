# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Serveur HTTPS principal
server {
    listen 443 ssl;
    server_name _;

    # ----------------------------------------------------------
    # Certificats TLS
    # ----------------------------------------------------------
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Auth proxy interne (service auth-proxy:4000)
    # Toutes les requêtes passent d'abord par /auth/check
    # ----------------------------------------------------------
    location = /auth/check {
        internal;
        proxy_pass              http://auth:4000/auth/check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
    }

    # Pages de login/logout accessibles sans auth
    location /auth/ {
        proxy_pass         http://auth:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    # Proxy vers l'API REST interne — protégé par auth
    location /api/ {
        auth_request /auth/check;
        error_page 401 = @login_redirect;

        proxy_pass         http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy Winget — NON protégé (clients Windows winget.exe)
    location /winget/ {
        proxy_pass         http://api:3000/winget/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Dashboard React — protégé par auth
    location / {
        auth_request /auth/check;
        error_page 401 = @login_redirect;

        try_files $uri $uri/ /index.html;
    }

    # Redirection vers la page de login
    location @login_redirect {
        return 302 /auth/login;
    }

    # En-têtes de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";
}
