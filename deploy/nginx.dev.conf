# ============================================================
# nginx.dev.conf — Configuration HTTP uniquement (dev local)
# Pas de TLS, pas de redirection HTTPS
# ============================================================

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Resolver DNS de Docker — résolution au moment de la requête
    # (évite l'erreur "host not found" si auth/api démarrent après nginx)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ----------------------------------------------------------
    # Auth proxy interne (service auth-proxy:4000)
    # ----------------------------------------------------------
    location = /auth/check {
        internal;
        set $auth_backend http://auth:4000;
        proxy_pass              $auth_backend/auth/check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
    }

    location /auth/ {
        set $auth_backend http://auth:4000;
        proxy_pass         $auth_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    # Proxy vers l'API REST — protégé par auth
    location /api/ {
        auth_request /auth/check;
        error_page 401 = @login_redirect;

        set $api_backend http://api:3000;
        proxy_pass         $api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Endpoint winget (clients Windows) — sans auth
    location /winget/ {
        set $api_backend http://api:3000;
        proxy_pass         $api_backend/winget/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Dashboard (SPA React) — protégé par auth
    location / {
        auth_request /auth/check;
        error_page 401 = @login_redirect;
        try_files $uri $uri/ /index.html;
    }

    location @login_redirect {
        return 302 /auth/login?next=$request_uri;
    }
}
