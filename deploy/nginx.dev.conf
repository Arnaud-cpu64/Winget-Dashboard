# ============================================================
# nginx.dev.conf — Configuration HTTP uniquement (dev local)
# Pas de TLS, pas de redirection HTTPS
# ============================================================

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Auth proxy interne (service auth-proxy:4000)
    # ----------------------------------------------------------
    location = /auth/check {
        internal;
        proxy_pass              http://auth:4000/auth/check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
    }

    # Pages de login/logout accessibles sans auth
    location /auth/ {
        proxy_pass         http://auth:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    # Proxy vers l'API REST — protégé par auth
    location /api/ {
        auth_request /auth/check;
        error_page 401 = @login_redirect;

        proxy_pass         http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Endpoint winget (clients Windows) — sans auth
    location /winget/ {
        proxy_pass         http://api:3000/winget/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Dashboard (SPA React) — protégé par auth
    location / {
        auth_request /auth/check;
        error_page 401 = @login_redirect;
        try_files $uri $uri/ /index.html;
    }

    location @login_redirect {
        return 302 /auth/login?next=$request_uri;
    }
}
