# ============================================================
# docker-compose.yml — Configuration de base WG-Repo
#
# Les images sont construites directement sur le serveur
# depuis le code source (pas de registre Docker requis).
#
# Usage (depuis le dossier deploy/) :
#   PROD : docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   REC  : docker compose -f docker-compose.yml -f docker-compose.rec.yml  --env-file .env.rec  up -d --build
#
# CERTS_DIR : dossier sur l'hôte contenant cert.pem et key.pem
# ============================================================

name: wg-repo

services:

  # ----------------------------------------------------------
  # PostgreSQL — base de données
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-wgrepo}
      POSTGRES_USER:     ${POSTGRES_USER:-wgrepo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?La variable POSTGRES_PASSWORD est obligatoire}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wgrepo} -d ${POSTGRES_DB:-wgrepo}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ----------------------------------------------------------
  # Migrator — applique le schéma Drizzle (run-once)
  # ----------------------------------------------------------
  migrate:
    image: wg-repo-migrator:latest
    build:
      context: ..
      dockerfile: Dockerfile.migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wgrepo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wgrepo}
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  # API — serveur Express/Node.js
  # ----------------------------------------------------------
  api:
    image: wg-repo-api:latest
    build:
      context: ..
      dockerfile: Dockerfile.api
    environment:
      PORT:         3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-wgrepo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wgrepo}
      NODE_ENV:     production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ----------------------------------------------------------
  # Dashboard — nginx + TLS + fichiers statiques React
  # ----------------------------------------------------------
  dashboard:
    image: wg-repo-dashboard:latest
    build:
      context: ..
      dockerfile: Dockerfile.dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CERTS_DIR:?Définir CERTS_DIR dans .env}:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  db_data:
