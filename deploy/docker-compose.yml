# ============================================================
# docker-compose.yml — Configuration de base WG-Repo
#
# Images publiées sur GHCR par GitHub Actions.
#
# Usage (depuis le dossier deploy/) :
#   PROD : docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
#   REC  : docker compose -f docker-compose.yml -f docker-compose.rec.yml  --env-file .env.rec  up -d
#
# Variables :
#   REGISTRY   : ghcr.io/arnaud-edu-cpu64 (par défaut)
#   TAG        : tag de l'image (ex: v1.0.0 ou latest)
#   CERTS_DIR  : dossier sur l'hôte contenant cert.pem et key.pem
# ============================================================

name: wg-repo

services:

  # ----------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------
  db:
    image: ${REGISTRY:-ghcr.io/arnaud-edu-cpu64}/wg-repo-postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-wgrepo}
      POSTGRES_USER:     ${POSTGRES_USER:-wgrepo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?La variable POSTGRES_PASSWORD est obligatoire}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wgrepo} -d ${POSTGRES_DB:-wgrepo}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ----------------------------------------------------------
  # Migrator — applique le schéma Drizzle (run-once)
  # ----------------------------------------------------------
  migrate:
    image: ${REGISTRY:-ghcr.io/arnaud-edu-cpu64}/wg-repo-migrator:${TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wgrepo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wgrepo}
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  # API — Express/Node.js
  # ----------------------------------------------------------
  api:
    image: ${REGISTRY:-ghcr.io/arnaud-edu-cpu64}/wg-repo-api:${TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.api
    environment:
      PORT:         3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-wgrepo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wgrepo}
      NODE_ENV:     production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ----------------------------------------------------------
  # Auth Proxy — authentification LDAP/AD
  # ----------------------------------------------------------
  auth:
    image: ${REGISTRY:-ghcr.io/arnaud-edu-cpu64}/wg-repo-auth:${TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.auth
    environment:
      PORT:             4000
      SESSION_SECRET:   ${SESSION_SECRET:?La variable SESSION_SECRET est obligatoire}
      # URLs des contrôleurs de domaine (séparées par des virgules)
      LDAP_URLS:        ${LDAP_URLS:-ldap://ECUREUIL.ge-pedago.etat-ge.ch,ldap://ELEPHANT.ge-pedago.etat-ge.ch}
      LDAP_BASE_DN:     ${LDAP_BASE_DN:-DC=ge-pedago,DC=etat-ge,DC=ch}
      LDAP_USER_BASE:   ${LDAP_USER_BASE:-OU=Utilisateurs,DC=ge-pedago,DC=etat-ge,DC=ch}
      LDAP_GROUP_DN:    ${LDAP_GROUP_DN:-CN=GAP-Winget,OU=GAP,OU=DIP,OU=Groupes,OU=EDUV2018,OU=___,DC=ge-pedago,DC=etat-ge,DC=ch}
      LDAP_DOMAIN:      ${LDAP_DOMAIN:-ge-pedago}
      SESSION_MAX_AGE_HOURS: ${SESSION_MAX_AGE_HOURS:-8}
    depends_on:
      - api

  # ----------------------------------------------------------
  # Dashboard — nginx + TLS + auth_request
  # ----------------------------------------------------------
  dashboard:
    image: ${REGISTRY:-ghcr.io/arnaud-edu-cpu64}/wg-repo-dashboard:${TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CERTS_DIR:?Définir CERTS_DIR dans .env}:/etc/nginx/certs:ro
    depends_on:
      - api
      - auth

volumes:
  db_data:
