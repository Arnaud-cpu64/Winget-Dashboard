# ============================================================
# docker-compose.rec.yml — Surcharges RECETTE
#
# Serveur RHEL9 REC — restart souple, volumes nommés rec
# URL : https://eduwinget.rec.etat-ge.ch
# ============================================================

name: wg-repo-rec

services:

  db:
    restart: unless-stopped
    volumes:
      - db_data_rec:/var/lib/postgresql/data

  migrate:
    restart: "no"

  api:
    restart: unless-stopped

  dashboard:
    restart: unless-stopped

volumes:
  db_data_rec:
