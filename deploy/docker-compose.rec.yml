# ============================================================
# docker-compose.rec.yml — Surcharges RECETTE (staging)
#
# Serveur RHEL9 REC — restart souple, volumes nommés rec
# Port 8080 par défaut pour éviter le conflit avec d'autres services
# ============================================================

name: wg-repo-rec

services:

  db:
    restart: unless-stopped
    volumes:
      - db_data_rec:/var/lib/postgresql/data

  migrate:
    restart: "no"

  api:
    restart: unless-stopped

  dashboard:
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"

volumes:
  db_data_rec:
